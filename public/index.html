<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Polymarket Forecaster</title>
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; }
  body { margin: 0; background: #0e1116; color: #e6edf3;
         font: 14px/1.55 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
  .wrap { max-width: 1000px; margin: 0 auto; padding: 32px 18px 72px; }
  h1 { font-size: 20px; margin: 0 0 2px; letter-spacing: .3px; }
  .sub { color: #7d8590; font-size: 12px; margin-bottom: 22px; }
  .cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 12px; margin-bottom: 26px; }
  .card { background: #161b22; border: 1px solid #21262d; border-radius: 10px; padding: 14px 16px; }
  .card .label { color: #7d8590; font-size: 11px; text-transform: uppercase; letter-spacing: .5px; }
  .card .value { font-size: 22px; font-weight: 600; margin-top: 4px; }
  .pos { color: #3fb950; } .neg { color: #f85149; } .muted { color: #7d8590; }
  h2 { font-size: 13px; text-transform: uppercase; letter-spacing: .6px; color: #7d8590;
       margin: 30px 0 10px; font-weight: 600; }
  table { width: 100%; border-collapse: collapse; }
  th { text-align: left; font-size: 11px; text-transform: uppercase; letter-spacing: .5px;
       color: #7d8590; font-weight: 600; padding: 8px 10px; border-bottom: 1px solid #21262d; }
  td { padding: 11px 10px; border-bottom: 1px solid #161b22; vertical-align: top; }
  tr:hover td { background: #11161d; }
  .num { text-align: right; font-variant-numeric: tabular-nums; white-space: nowrap; }
  .q a { color: #e6edf3; text-decoration: none; } .q a:hover { color: #58a6ff; }
  .pill { font-size: 10px; padding: 1px 7px; border-radius: 999px; border: 1px solid #30363d; color: #7d8590; margin-left: 6px; }
  .rationale { color: #7d8590; font-size: 12px; margin-top: 3px; max-width: 560px; }
  #trend { background: #161b22; border: 1px solid #21262d; border-radius: 10px; padding: 14px 16px; }
  .empty { color: #7d8590; padding: 28px 0; text-align: center; }
  .err { color: #f85149; padding: 14px; border: 1px solid #f85149; border-radius: 8px; background: #1d1213; }
  footer { margin-top: 28px; color: #484f58; font-size: 11px; }
</style>
</head>
<body>
<div class="wrap">
  <h1>Polymarket Forecaster</h1>
  <div class="sub">paper-trading research &middot; model vs crowd &middot; <span id="updated">loading&hellip;</span></div>

  <div id="error"></div>
  <div class="cards" id="cards"></div>

  <h2>Net edge trend (cumulative, resolved markets)</h2>
  <div id="trend"><div class="empty">no resolved markets yet</div></div>

  <h2>Open markets &mdash; ranked by model/crowd disagreement</h2>
  <div id="markets"><div class="empty">loading&hellip;</div></div>

  <h2>Prediction history (resolved)</h2>
  <div id="history"><div class="empty">loading&hellip;</div></div>

  <footer>auto-refreshes every 60s &middot; data via /api/dashboard</footer>
</div>

<script>
const pct = x => (x === null || x === undefined) ? "n/a" : Math.round(x * 100) + "%";
const f4  = x => (x === null || x === undefined) ? "n/a" : x.toFixed(4);
const esc = s => (s || "").replace(/[&<>"]/g, c => ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;" }[c]));
const cls = x => x > 0 ? "pos" : x < 0 ? "neg" : "muted";

function renderCards(c) {
  const edge = c.net_edge;
  const edgeHtml = edge === null
    ? '<span class="muted">n/a</span>'
    : `<span class="${cls(edge)}">${edge >= 0 ? "+" : ""}${f4(edge)}</span>`;
  document.getElementById("cards").innerHTML = `
    <div class="card"><div class="label">Tracked</div><div class="value">${c.tracked}</div></div>
    <div class="card"><div class="label">Resolved</div><div class="value">${c.resolved}</div></div>
    <div class="card"><div class="label">Scored</div><div class="value">${c.scored}</div></div>
    <div class="card"><div class="label">Model Brier</div><div class="value">${f4(c.model_brier)}</div></div>
    <div class="card"><div class="label">Market Brier</div><div class="value">${f4(c.market_brier)}</div></div>
    <div class="card"><div class="label">Net Edge</div><div class="value">${edgeHtml}</div></div>`;
}

function renderTrend(history) {
  const el = document.getElementById("trend");
  if (!history.length) { el.innerHTML = '<div class="empty">no resolved markets yet &mdash; edge is unknowable until markets settle</div>'; return; }
  // cumulative net edge = running mean of (marketBrier - modelBrier)
  let sum = 0; const pts = history.map((h, i) => { sum += (h.market_brier - h.model_brier); return sum / (i + 1); });
  const W = 920, H = 90, pad = 6;
  const min = Math.min(...pts, 0), max = Math.max(...pts, 0), span = (max - min) || 1;
  const x = i => pad + i * (W - 2 * pad) / Math.max(pts.length - 1, 1);
  const y = v => pad + (H - 2 * pad) * (1 - (v - min) / span);
  const line = pts.map((v, i) => `${i ? "L" : "M"}${x(i).toFixed(1)},${y(v).toFixed(1)}`).join(" ");
  const last = pts[pts.length - 1];
  el.innerHTML = `<svg viewBox="0 0 ${W} ${H}" width="100%" height="${H}" preserveAspectRatio="none">
      <line x1="${pad}" y1="${y(0)}" x2="${W-pad}" y2="${y(0)}" stroke="#30363d" stroke-dasharray="3 3"/>
      <path d="${line}" fill="none" stroke="${last >= 0 ? "#3fb950" : "#f85149"}" stroke-width="2"/>
    </svg>
    <div class="${cls(last)}" style="font-size:12px;margin-top:6px">current cumulative net edge: ${last >= 0 ? "+" : ""}${f4(last)} ${history.length < 50 ? '<span class="muted">(noise until ~50 resolved)</span>' : ""}</div>`;
}

function renderMarkets(markets) {
  const el = document.getElementById("markets");
  if (!markets.length) { el.innerHTML = '<div class="empty">no forecasts yet &mdash; run the forecast endpoint</div>'; return; }
  const rows = markets.map(m => {
    const edge = m.edge;
    const big = (edge !== null && Math.abs(edge) >= 0.10) ? '<span class="pill">BIG GAP</span>' : "";
    const link = m.slug ? `https://polymarket.com/event/${esc(m.slug)}` : "#";
    const edgeCell = edge === null ? '<span class="muted">n/a</span>'
      : `<span class="${cls(edge)}">${edge >= 0 ? "+" : ""}${Math.round(edge*100)} pts</span>`;
    return `<tr>
      <td class="q"><a href="${link}" target="_blank" rel="noopener">${esc(m.question)}</a>${big}</td>
      <td class="num">${pct(m.model)}</td>
      <td class="num muted">${pct(m.crowd)}</td>
      <td class="num">${edgeCell}</td>
    </tr>`;
  }).join("");
  el.innerHTML = `<table><thead><tr><th>Market</th><th class="num">Model</th><th class="num">Crowd</th><th class="num">Edge</th></tr></thead><tbody>${rows}</tbody></table>`;
}

function renderHistory(history) {
  const el = document.getElementById("history");
  if (!history.length) { el.innerHTML = '<div class="empty">no resolved predictions yet</div>'; return; }
  const rows = history.slice().reverse().map(h => `<tr>
      <td class="q">${esc(h.question)}</td>
      <td class="num">${h.outcome == 1 ? '<span class="pos">YES</span>' : '<span class="neg">NO</span>'}</td>
      <td class="num">${pct(h.model)}</td>
      <td class="num muted">${pct(h.crowd)}</td>
      <td class="num">${f4(h.model_brier)}</td>
      <td class="num muted">${f4(h.market_brier)}</td>
    </tr>`).join("");
  el.innerHTML = `<table><thead><tr><th>Market</th><th class="num">Outcome</th><th class="num">Model</th><th class="num">Crowd</th><th class="num">Model B</th><th class="num">Mkt B</th></tr></thead><tbody>${rows}</tbody></table>`;
}

async function load() {
  try {
    const res = await fetch("/api/dashboard", { cache: "no-store" });
    if (!res.ok) throw new Error("HTTP " + res.status);
    const data = await res.json();
    if (data.error) throw new Error(data.error);
    document.getElementById("error").innerHTML = "";
    renderCards(data.calibration);
    renderTrend(data.history);
    renderMarkets(data.markets);
    renderHistory(data.history);
    document.getElementById("updated").textContent = new Date().toLocaleString();
  } catch (e) {
    document.getElementById("error").innerHTML = `<div class="err">Failed to load /api/dashboard: ${esc(e.message)}</div>`;
  }
}
load();
setInterval(load, 60000);
</script>
</body>
</html>
