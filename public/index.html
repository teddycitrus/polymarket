<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Polymarket Forecaster</title>
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; }
  body { margin: 0; background: #0e1116; color: #e6edf3;
         font: 14px/1.55 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
  .wrap { max-width: 1000px; margin: 0 auto; padding: 32px 18px 72px; }
  h1 { font-size: 20px; margin: 0 0 2px; letter-spacing: .3px; }
  .sub { color: #7d8590; font-size: 12px; margin-bottom: 22px; }
  .cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 12px; margin-bottom: 26px; }
  .card { background: #161b22; border: 1px solid #21262d; border-radius: 10px; padding: 14px 16px; }
  .card .label { color: #7d8590; font-size: 11px; text-transform: uppercase; letter-spacing: .5px; }
  .card .value { font-size: 22px; font-weight: 600; margin-top: 4px; }
  .pos { color: #3fb950; } .neg { color: #f85149; } .muted { color: #7d8590; }
  h2 { font-size: 13px; text-transform: uppercase; letter-spacing: .6px; color: #7d8590;
       margin: 30px 0 10px; font-weight: 600; }
  table { width: 100%; border-collapse: collapse; }
  th { text-align: left; font-size: 11px; text-transform: uppercase; letter-spacing: .5px;
       color: #7d8590; font-weight: 600; padding: 8px 10px; border-bottom: 1px solid #21262d; }
  td { padding: 11px 10px; border-bottom: 1px solid #161b22; vertical-align: top; }
  tr:hover td { background: #11161d; }
  .num { text-align: right; font-variant-numeric: tabular-nums; white-space: nowrap; }
  .q a { color: #e6edf3; text-decoration: none; } .q a:hover { color: #58a6ff; }
  .pill { font-size: 10px; padding: 1px 7px; border-radius: 999px; border: 1px solid #30363d; color: #7d8590; margin-left: 6px; }
  .rationale { color: #7d8590; font-size: 12px; margin-top: 3px; max-width: 560px; }
  #trend { background: #161b22; border: 1px solid #21262d; border-radius: 10px; padding: 14px 16px; }
  .empty { color: #7d8590; padding: 28px 0; text-align: center; }
  .err { color: #f85149; padding: 14px; border: 1px solid #f85149; border-radius: 8px; background: #1d1213; }
  footer { margin-top: 28px; color: #484f58; font-size: 11px; }
</style>
</head>
<body>
<div class="wrap">
  <h1>Polymarket Forecaster</h1>
  <div class="sub">paper-trading research &middot; model vs crowd &middot; <span id="updated">loading&hellip;</span></div>

  <div id="error"></div>
  <div class="cards" id="cards"></div>

  <h2>Net edge trend (cumulative, resolved markets)</h2>
  <div id="trend"><div class="empty">no resolved markets yet</div></div>

  <h2>Open markets &mdash; ranked by model/crowd disagreement</h2>
  <div id="markets"><div class="empty">loading&hellip;</div></div>

  <h2>Prediction history (resolved)</h2>
  <div id="history"><div class="empty">loading&hellip;</div></div>

  <footer>auto-refreshes every 60s &middot; data via /api/dashboard</footer>
</div>
<script src="/app.js" defer></script>
</body>
</html>
